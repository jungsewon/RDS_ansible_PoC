all:
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'    # SSH 호스트키 자동 수락
  children:
    onprem_linux:
      hosts:
        ansible_host1:                                           # VM 호스트명
          ansible_host: 192.168.1.104                      # VM IP
          ansible_user: root                               # 루트 또는 일반 사용자
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519      # SSH 키 경로 (키 있으면)
          #ansible_ssh_pass: "{{ vault_ssh_pass }}"       # 패스워드 (Vault 사용시)
