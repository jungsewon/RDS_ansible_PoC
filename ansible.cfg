[defaults]
inventory = ./inventories/prod                          # 기본 인벤토리 경로 (prod 환경)
host_key_checking = False                               # SSH 호스트키 자동 수락 (테스트용, 운영시 True)
retry_files_enabled = False                             # 실패 재시도 파일 생성 방지
roles_path = ./roles:/usr/share/ansible/roles           # 사용자/시스템 Role 검색 경로

[inventory]
enable_plugins = host_list, yaml, script, auto, azure.azcollection.azure_rm  # 인벤토리 플러그인 활성화 (클라우드 동적 인벤토리 포함)
vault_password_file = ~/.vault_pass.txt
